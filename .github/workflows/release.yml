name: Release and Publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write  # 允许创建 GitHub Release 和上传 Assets
  id-token: write  # 💡 核心修改：允许通过 OIDC 向 npm 进行可信发布认证

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest
    # 💡 我们把编译出来的文件作为 Artifacts 暂存，方便下一个 job (publish) 直接复用
    outputs:
      version: ${{ steps.get_version.outputs.VERSION }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.x'
          cache: true

      - name: Build Binaries
        env:
          CGO_ENABLED: 0
        run: |
          mkdir -p dist
          VERSION="${{ github.ref_name }}"
          # 💡 注意：为了对齐 Node.js 的 process.platform，Windows 这里统一命名为 win32
          GOOS=darwin GOARCH=amd64 go build -ldflags="-s -w -X 'github.com/claude-code-launch/ccl/cmd.Version=${VERSION}'" -o dist/ccl-darwin-amd64 main.go
          GOOS=darwin GOARCH=arm64 go build -ldflags="-s -w -X 'github.com/claude-code-launch/ccl/cmd.Version=${VERSION}'" -o dist/ccl-darwin-arm64 main.go
          GOOS=linux GOARCH=amd64 go build -ldflags="-s -w -X 'github.com/claude-code-launch/ccl/cmd.Version=${VERSION}'" -o dist/ccl-linux-amd64 main.go
          GOOS=linux GOARCH=arm64 go build -ldflags="-s -w -X 'github.com/claude-code-launch/ccl/cmd.Version=${VERSION}'" -o dist/ccl-linux-arm64 main.go
          GOOS=windows GOARCH=amd64 go build -ldflags="-s -w -X 'github.com/claude-code-launch/ccl/cmd.Version=${VERSION}'" -o dist/ccl-win32-x64.exe main.go
          GOOS=windows GOARCH=arm64 go build -ldflags="-s -w -X 'github.com/claude-code-launch/ccl/cmd.Version=${VERSION}'" -o dist/ccl-win32-arm64.exe main.go

      - name: List dist files
        run: ls -lh dist

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/ccl-darwin-amd64
            dist/ccl-darwin-arm64
            dist/ccl-linux-amd64
            dist/ccl-linux-arm64
            dist/ccl-win32-x64.exe
            dist/ccl-win32-arm64.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 把编译好的包临时存起来给下一个 Job 用
      - name: Upload dist artifacts
        uses: actions/upload-artifact@v6
        with:
          name: go-binaries
          path: dist/

  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: release
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Download Go Binaries
        uses: actions/download-artifact@v7
        with:
          name: go-binaries
          path: tmp-bin/

      - name: Prepare npm Assets
        run: |
          mkdir -p bin
          mv tmp-bin/* bin/
          rm -rf tmp-bin
          chmod +x bin/ccl-*
          chmod +x bin/wrapper.js

      # 💡 核心注入：从 Git Tag 中提取版本号（去掉开头的 v），并直接动态写入 package.json
      - name: Sync Version from Git Tag
        run: |
          # ${GITHUB_REF_NAME} 在 tag 触发时就是 "v1.0.1"
          # sed 's/^v//' 会把开头的 "v" 剥离掉，变成 "1.0.1"
          # 提取纯数字版本号
          RAW_VERSION=$(echo "${{ github.ref_name }}" | sed 's/^v//')
          if [[ "$RAW_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              CLEAN_VERSION=$(echo "$RAW_VERSION" | sed -E 's/\.([0-9]+)$/-\1/')
          else
              CLEAN_VERSION="$RAW_VERSION"
          fi
          echo "Original Tag: ${{ github.ref_name }}"
          echo "Sanitized npm version: $CLEAN_VERSION"

          # 使用 npm 官方自带命令动态修改 package.json 的版本号，且不触发任何 git commit
          npm version $CLEAN_VERSION --no-git-tag-version

      - name: Publish to npm with Trusted Publishing
        run: npm publish --provenance --access public