name: Release and Publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write  # 允许创建 GitHub Release 和上传 Assets
  id-token: write  # 💡 核心修改：允许通过 OIDC 向 npm 进行可信发布认证

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest
    # 💡 我们把编译出来的文件作为 Artifacts 暂存，方便下一个 job (publish) 直接复用
    outputs:
      version: ${{ steps.get_version.outputs.VERSION }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
          cache: true

      - name: Build Binaries
        env:
          CGO_ENABLED: 0
        run: |
          mkdir -p dist
          # 💡 注意：为了对齐 Node.js 的 process.platform，Windows 这里统一命名为 win32
          GOOS=darwin GOARCH=amd64 go build -ldflags="-s -w" -o dist/ccl-darwin-amd64 main.go
          GOOS=darwin GOARCH=arm64 go build -ldflags="-s -w" -o dist/ccl-darwin-arm64 main.go
          GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o dist/ccl-linux-amd64 main.go
          GOOS=linux GOARCH=arm64 go build -ldflags="-s -w" -o dist/ccl-linux-arm64 main.go
          GOOS=windows GOARCH=amd64 go build -ldflags="-s -w" -o dist/ccl-win32-x64.exe main.go
          GOOS=windows GOARCH=arm64 go build -ldflags="-s -w" -o dist/ccl-win32-arm64.exe main.go

      - name: List dist files
        run: ls -lh dist

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/ccl-darwin-amd64
            dist/ccl-darwin-arm64
            dist/ccl-linux-amd64
            dist/ccl-linux-arm64
            dist/ccl-win32-x64.exe
            dist/ccl-win32-arm64.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 把编译好的包临时存起来给下一个 Job 用
      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: go-binaries
          path: dist/

  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: release
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      # 💡 下载前面编译好的原生二进制文件
      - name: Download Go Binaries
        uses: actions/download-artifact@v4
        with:
          name: go-binaries
          path: bin/

      # 💡 把编译出来的二进制和你的 wrapper.js 放在一起，并赋予执行权限
      - name: Prepare npm Assets
        run: |
          chmod +x bin/ccl-*
          chmod +x bin/wrapper.js
          echo "=== Verification of files inside bin/ ==="
          ls -lh bin/

      # 💡 核心修改：利用 `--provenance` 开启可信发布，彻底告别 NPM_TOKEN 密钥
      - name: Publish to npm with Trusted Publishing
        run: npm publish --provenance --access public