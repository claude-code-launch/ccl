name: Release and Publish

on:
  push:
    tags:
      - '**'
  workflow_dispatch:

permissions:
  contents: write  # 允许创建 GitHub Release 和上传 Assets
  id-token: write  # 💡 核心修改：允许通过 OIDC 向 npm 进行可信发布认证

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    name: Build, Release and Publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.x'
          cache: true
          cache-dependency-path: go.sum

      - name: Build Binaries
        env:
          CGO_ENABLED: 0
        run: |
          mkdir -p dist
          VERSION="${{ github.ref_name }}"
          LDFLAGS="-s -w -X github.com/claude-code-launch/ccl/cmd.Version=${VERSION}"
          # 💡 注意：为了对齐 Node.js 的 process.platform，Windows 这里统一命名为 win32
          pids=()
          GOOS=darwin GOARCH=amd64 go build -ldflags="$LDFLAGS" -o dist/ccl-darwin-amd64 main.go & pids+=($!)
          GOOS=darwin GOARCH=arm64 go build -ldflags="$LDFLAGS" -o dist/ccl-darwin-arm64 main.go & pids+=($!)
          GOOS=linux GOARCH=amd64 go build -ldflags="$LDFLAGS" -o dist/ccl-linux-amd64 main.go & pids+=($!)
          GOOS=linux GOARCH=arm64 go build -ldflags="$LDFLAGS" -o dist/ccl-linux-arm64 main.go & pids+=($!)
          GOOS=windows GOARCH=amd64 go build -ldflags="$LDFLAGS" -o dist/ccl-win32-x64.exe main.go & pids+=($!)
          GOOS=windows GOARCH=arm64 go build -ldflags="$LDFLAGS" -o dist/ccl-win32-arm64.exe main.go & pids+=($!)
          for pid in "${pids[@]}"; do
            wait "$pid"
          done

      - name: List dist files
        run: ls -lh dist

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/ccl-darwin-amd64
            dist/ccl-darwin-arm64
            dist/ccl-linux-amd64
            dist/ccl-linux-arm64
            dist/ccl-win32-x64.exe
            dist/ccl-win32-arm64.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Prepare npm Assets
        run: |
          cp dist/* bin/
          chmod +x bin/ccl-*
          chmod +x bin/wrapper.js

      # 💡 核心注入：从 Git Tag 中提取版本号（去掉开头的 v），并直接动态写入 package.json
      - name: Sync Version from Git Tag
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          # TAG_NAME 在 tag 触发时可能是 "v1.0.1"、"1.0.1" 或 "release/v1.0.1"。
          # 取最后一段并剥离开头的 v，得到 npm 可用版本号。
          TAG_VERSION="${TAG_NAME##*/}"
          RAW_VERSION="${TAG_VERSION#v}"
          if [[ "$RAW_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              CLEAN_VERSION=$(echo "$RAW_VERSION" | sed -E 's/\.([0-9]+)$/-\1/')
          else
              CLEAN_VERSION="$RAW_VERSION"
          fi
          echo "Original Tag: $TAG_NAME"
          echo "Sanitized npm version: $CLEAN_VERSION"

          # 使用 npm 官方自带命令动态修改 package.json 的版本号，且不触发任何 git commit
          npm version $CLEAN_VERSION --no-git-tag-version

      - name: Check npm Version
        id: npm_version
        run: |
          PKG_NAME=$(node -p "require('./package.json').name")
          PKG_VERSION=$(node -p "require('./package.json').version")
          if npm view "${PKG_NAME}@${PKG_VERSION}" version >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "${PKG_NAME}@${PKG_VERSION} already exists; skipping npm publish."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm with Trusted Publishing
        if: steps.npm_version.outputs.exists != 'true'
        run: npm publish --provenance --access public
