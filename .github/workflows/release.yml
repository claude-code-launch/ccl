name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.x'

      - name: Build Binaries
        env:
          CGO_ENABLED: 0
        run: |
          mkdir -p dist

          # macOS
          GOOS=darwin GOARCH=amd64 go build -ldflags="-s -w" -o dist/cc-darwin-amd64 main.go
          GOOS=darwin GOARCH=arm64 go build -ldflags="-s -w" -o dist/cc-darwin-arm64 main.go

          # Linux
          GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o dist/cc-linux-amd64 main.go
          GOOS=linux GOARCH=arm64 go build -ldflags="-s -w" -o dist/cc-linux-arm64 main.go

          # Windows
          GOOS=windows GOARCH=amd64 go build -ldflags="-s -w" -o dist/cc-windows-amd64.exe main.go

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/cc-darwin-amd64
            dist/cc-darwin-arm64
            dist/cc-linux-amd64
            dist/cc-linux-arm64
            dist/cc-windows-amd64.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
