changelog:
  exclude:
    authors:
      - github-actions[bot]
  categories:
    - title: "🚀 Features & Enhancements"
      labels:
        - feature
        - feat
        - enhancement
      regex:
        - "^feat"
        - "^enhancement"
    - title: "🐛 Bug Fixes"
      labels:
        - fix
        - bug
        - hotfix
      regex:
        - "^fix"
        - "^bug"
        - "^hotfix"
    - title: "🧰 Maintenance & Chore"
      labels:
        - chore
        - docs
        - ci
        - refactor
      regex:
        - "^ci"
        - "^chore"
        - "^docs"
        - "^refactor"