# GitHub Release Configuration
# Controls how release notes are automatically generated from commits

changelog:
  exclude:
    labels:
      - ignore
    authors:
      - github-actions[bot]
  categories:
    - title: "🚀 Features & Enhancements"
      labels:
        - feature
        - feat
        - enhancement
    - title: "🐛 Bug Fixes"
      labels:
        - fix
        - bug
        - hotfix
    - title: "🧰 Maintenance & Chore"
      labels:
        - chore
        - docs
        - ci
        - refactor
